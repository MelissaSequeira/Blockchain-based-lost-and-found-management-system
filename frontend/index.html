<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lost & Found DApp</title>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f5f7fa; }
        .card { border-radius: 12px; }
        .badge { font-size: 0.8rem; }
    </style>
</head>

<body class="container py-4">

    <h2 class="mb-3">🔗 Lost & Found (Blockchain)</h2>

    <!-- WALLET -->
    <button class="btn btn-dark mb-3" onclick="connectWallet()">Connect Wallet</button>
    <p id="wallet"></p>
    <p id="balance"></p>
    <p id="contractBal"></p>

    <div class="row">

        <!-- REPORT LOST -->
        <div class="col-md-6">
            <div class="card p-3 mb-3">
                <h5>Report Lost Item</h5>

                <input id="itemName" class="form-control mb-2" placeholder="Item Name">
                <input id="location" class="form-control mb-2" placeholder="Lost Location">
                <input id="reward" class="form-control mb-2" placeholder="Reward (ETH)">
                <input id="ownerEmail" class="form-control mb-2" placeholder="Owner Email">

                <button class="btn btn-primary" onclick="reportLost()">Submit</button>
            </div>
        </div>

        <!-- REPORT FOUND -->
        <div class="col-md-6">
            <div class="card p-3 mb-3">
                <h5>Report Found</h5>

                <input id="foundId" class="form-control mb-2" placeholder="Item ID">
                <input id="finderEmail" class="form-control mb-2" placeholder="Finder Email">

                <button class="btn btn-success" onclick="reportFound()">Mark Found</button>
            </div>
        </div>

    </div>

    <!-- APPROVE / CLAIM -->
    <div class="row">
        <div class="col-md-6">
            <div class="card p-3 mb-3">
                <h5>Approve Reward</h5>
                <input id="approveId" class="form-control mb-2" placeholder="Item ID">
                <button class="btn btn-info" onclick="approveReward()">Approve</button>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3 mb-3">
                <h5>Claim Reward</h5>
                <input id="claimId" class="form-control mb-2" placeholder="Item ID">
                <button class="btn btn-warning" onclick="claimReward()">Claim</button>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="card p-3 mb-3">
        <h5>Items Dashboard</h5>

        <table class="table table-bordered mt-2">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Details</th>
                    <th>Reward</th>
                    <th>Owner</th>
                    <th>Owner Email</th>
                    <th>Finder</th>
                    <th>Finder Email</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="itemsBody"></tbody>
        </table>
    </div>

    <!-- CREATE FORM -->
    <div class="card p-3 mb-3">
        <h5>Create Verification Form (Finder)</h5>

        <input id="modalItemId" class="form-control mb-2" placeholder="Item ID">

        <input id="q1" class="form-control mb-2" placeholder="Question 1">
        <input id="q2" class="form-control mb-2" placeholder="Question 2">
        <input id="q3" class="form-control mb-2" placeholder="Question 3">

        <button class="btn btn-secondary" onclick="saveForm()">Save Questions</button>
    </div>

    <!-- OWNER ANSWERS -->
    <div id="ownerFormsSection" style="display:none;">
        <div class="card p-3 mb-3">
            <h5>Answer Questions (Owner)</h5>
            <div id="ownerFormsContainer"></div>
        </div>
    </div>

    <!-- FINDER VERIFY -->
    <div id="finderResponsesSection" style="display:none;">
        <div class="card p-3 mb-3">
            <h5>Verify Owner (Finder)</h5>
            <div id="finderResponsesContainer"></div>
        </div>
    </div>

    <!-- EXPORT / IMPORT -->
    <div class="card p-3 mb-3">
        <h5>Transfer Data (Optional)</h5>

        <textarea id="transferBox" class="form-control mb-2" placeholder="Encoded Data"></textarea>

        <button class="btn btn-outline-primary me-2" onclick="exportFormData()">Export</button>
        <button class="btn btn-outline-success me-2" onclick="importFormData()">Import</button>
        <button class="btn btn-outline-danger" onclick="sendViaEmail()">Send via Gmail</button>
    </div>

    <!-- SCRIPT -->
    <script src="app.js"></script>

</body>
</html>
