<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Blockchain Lost & Found</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/web3/dist/web3.min.js"></script>

<style>
body{
    background:#f5f7fb;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.table th{
    background:#0d6efd;
    color:white;
}

.badge-big{
    font-size:14px;
    padding:8px 12px;
}
</style>

</head>
<body>

<div class="container py-4">

    <h1 class="text-center mb-4">
        Blockchain Lost & Found System
    </h1>

    <!-- WALLET CARD -->
    <div class="card p-4 mb-4">
        <div class="row">
            <div class="col-md-8">
                <h5 id="wallet">Not Connected</h5>
                <p class="mb-0" id="balance">Balance: 0 ETH</p>
                <p class="mb-0" id="contractBal">Contract: 0 ETH</p>
            </div>

            <div class="col-md-4 text-end">
                <button class="btn btn-primary"
                onclick="connectWallet()">
                    Connect MetaMask
                </button>
            </div>
        </div>
    </div>

    <!-- REPORT LOST -->
    <div class="card p-4 mb-4">
        <h4 class="mb-3">Report Lost Item</h4>

        <div class="row g-3">

            <div class="col-md-6">
                <input class="form-control"
                id="itemName"
                placeholder="Item Name">
            </div>

            <div class="col-md-6">
                <input class="form-control"
                id="category"
                placeholder="Category">
            </div>

            <div class="col-md-6">
                <input class="form-control"
                id="location"
                placeholder="Lost Location">
            </div>

            <div class="col-md-6">
                <input class="form-control"
                id="proofHash"
                placeholder="Secret Proof">
            </div>

            <div class="col-md-6">
                <input class="form-control"
                id="reward"
                placeholder="Reward ETH">
            </div>

            <div class="col-md-6">
                <button class="btn btn-success w-100"
                onclick="reportLost()">
                    Submit Lost Item
                </button>
            </div>

        </div>
    </div>

    <!-- ACTIONS -->
    <div class="card p-4 mb-4">
        <h4 class="mb-3">Actions</h4>

        <div class="row g-3">

            <div class="col-md-4">
                <input class="form-control"
                id="foundId"
                placeholder="Item ID">
                <button class="btn btn-warning w-100 mt-2"
                onclick="reportFound()">
                    Mark Found
                </button>
            </div>

            <div class="col-md-4">
                <input class="form-control"
                id="approveId"
                placeholder="Item ID">
                <button class="btn btn-info w-100 mt-2"
                onclick="approveReward()">
                    Approve Reward
                </button>
            </div>

            <div class="col-md-4">
                <input class="form-control mb-2"
                id="claimId"
                placeholder="Item ID">

                <input class="form-control"
                id="enteredHash"
                placeholder="Proof">

                <button class="btn btn-dark w-100 mt-2"
                onclick="claimReward()">
                    Claim Reward
                </button>
            </div>

        </div>
    </div>

    <!-- ITEMS TABLE -->
    <div class="card p-4">

        <div class="d-flex justify-content-between mb-3">
            <h4>All Items</h4>

            <button class="btn btn-secondary"
            onclick="loadItems()">
                Refresh
            </button>
        </div>

        <div class="table-responsive">

            <table class="table table-bordered">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Location</th>
                        <th>Reward</th>
                        <th>Owner</th>
                        <th>Finder</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="itemsBody"></tbody>

            </table>

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
